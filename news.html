<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News - Tjay's News Blog</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>Tjay's News Blog</h1>
    <p>Opinion pieces & deep thoughts by Tjay Earl</p>

    <!-- Navigation Bar -->
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="news.html">News</a></li>
        <li><a href="opinions.html">Ideas & Opinions</a></li>
        <li><a href="tech.html">Tech & Code</a></li>
        <li><a href="reviews.html">Book & Course Reviews</a></li>
        <li><a href="gaming.html">Gaming & Culture</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
    </nav>

    <!-- Dark/Light Toggle -->
    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="mode-toggle" />
        <span class="slider round"></span>
      </label>
      <span id="mode-label">Light Mode</span>
    </div>
  </header>
  <main>
    <section class="add-news-form">
      <h2>Add a News Article</h2>
      <form id="news-form">
        <div class="form-group">
          <label for="news-title">Title:</label>
          <input type="text" id="news-title" name="news-title" placeholder="e.g., New AI Model Released" required>
        </div>
        <div class="form-group">
          <label for="news-url">URL:</label>
          <input type="url" id="news-url" name="news-url" placeholder="https://example.com/news-story" required>
        </div>
        <div class="form-group">
          <label for="news-description">Description:</label>
          <textarea id="news-description" name="news-description" rows="3" placeholder="A short summary of the article..." required></textarea>
        </div>
        <button type="submit">Add News</button>
      </form>
    </section>

    <section id="news-list" class="blog-list">
      <!-- News articles will be added here dynamically -->
    </section>
  </main>

  <footer>
    <p>© 2025 Tjay Earl | Built with curiosity</p>
  </footer>

  <script src="blog.js"></script>
  <script src="news.js"></script>
</body>
</html>
